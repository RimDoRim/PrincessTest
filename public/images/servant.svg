  <ellipse cx="162" cy="210" rx="18" ry="8" fill="#8B7355" filter="url(#w)"/>
  <!-- Sweat drop -->
  <path d="M140 80 Q143 74 140 70 Q137 74 140 80Z" fill="#88CCFF" filter="url(#w)"/>
